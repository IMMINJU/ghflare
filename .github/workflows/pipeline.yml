name: Data Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-process all issues (ignore existing)'
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: pnpm tsx scripts/pipeline.ts ${{ inputs.force && '--force' || '' }}
